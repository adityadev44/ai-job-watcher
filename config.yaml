# IndiGo uses SAP SuccessFactors VERP/JUIC/DWR. No keyword search config is
# needed — the fetcher grabs all available listings (page 1, newest 10) in
# each run via Playwright and passes them straight to Gate 1 title matching.
indigo_search:
  # Placeholder — no server-side keyword filtering available.
  note: "Fetcher uses Playwright DWR; all 10 newest jobs returned per run."

# SIA Engineering uses SAP SuccessFactors J2W (same as GMR Group).
# Portal: careers.singaporeair.com/siaec — no keyword filtering available.
# All active listings (~10-30) are returned per run and passed to Gate 1.
sia_search:
  max_listings: 200
  inter_page_delay: 0.3
  note: "Fetcher uses J2W HTML scraping; no server-side keyword filtering."

# Etihad Engineering uses Oracle HCM Cloud Recruiting. No keyword filtering
# is applied server-side — the API returns all active listings (typically 5-30)
# and all are passed to Gate 1 title matching.
etihad_search:
  # Placeholder — no server-side keyword filtering available.
  note: "Fetcher uses Oracle HCM REST API; all active listings returned per run."

# Saudia Technic (Saudi Airlines maintenance arm) uses Talentera by Bayt.com.
# Portal: careers.saudiatechnic.com — AJAX-driven, requires session token from page HTML.
# Typically very low volume (1-10 active jobs). No keyword filtering server-side.
saudia_technic_search:
  max_listings: 200
  inter_page_delay: 0.5
  note: "Talentera/Bayt AJAX API; GET listing page for USER_token, POST action=1 for jobs. 10 jobs/page."

# StandardAero uses Oracle HCM Cloud Recruiting — same ATS as Etihad Engineering.
# Portal: cva.fa.us1.oraclecloud.com (US1 data centre), site CX_3.
# ~250 total jobs; no server-side keyword filtering — fetch all, filter locally.
# Description only available via detail API — list response has short text only.
standardaero_search:
  max_listings: 300
  inter_page_delay: 0.2
  note: "Oracle HCM REST API; offset= pagination in finder string; ExternalDescriptionStr on detail endpoint."

# ST Engineering Aerospace uses SAP SuccessFactors J2W — same ATS as GMR and SIA.
# Portal: careers.stengg.com — no keyword filtering available.
# All listings fetched, then pre-filtered to Commercial Aerospace division in run_ste.py.
ste_search:
  max_listings: 500
  inter_page_delay: 0.3
  note: "Fetcher uses J2W HTML scraping; startrow= pagination (not start=). Pre-filtered to Commercial Aerospace."

# Qatar Airways uses Avature (portal ID 23). Jobs are server-side rendered HTML.
# All ~150 Qatar Airways Group jobs fetched via pagination (jobOffset=N, 6 per page).
# No server-side keyword or department filter — all jobs returned, Gate 1 filters to MRO/engineering.
# Description: GET /global/JobDetail/{slug}/{id} — first <section> tag (~4000 chars).
qatar_search:
  max_listings: 200
  inter_page_delay: 0.5
  note: "Avature HTML scraping; article.article--result; jobOffset= pagination; desc in first <section>."

# Lufthansa Technik uses a custom Lufthansa Group ATS at apply.lufthansagroup.careers.
# REST API returns all ~305 Lufthansa Group jobs in one GET call.
# Filter locally: ParentOrganizationName contains "Lufthansa Technik".
# ~100 LHT jobs across 14 subsidiary entities (Hamburg, Malta, Sofia, Shannon, etc.).
# No keyword filtering server-side — fetch all, pass all to Gate 1 title matching.
lht_search:
  max_listings: 500
  inter_page_delay: 0.3
  note: "Lufthansa Group REST API; one GET call; filter locally by ParentOrganizationName."

# Ethiopian Airlines uses a custom static HTML portal at corporate.ethiopianairlines.com.
# No external ATS — plain requests + BeautifulSoup. 4 paginated pages of listings.
# Jobs have no individual URLs; browseable URL is the page URL + #title-slug fragment.
# Descriptions are inline in accordion HTML — cached during fetch_jobs(), zero extra HTTP calls.
# Closing date only (no posting date) — same approach as Sanad.
# Dedup by title_slug|closing_date since no stable job IDs exist.
ethiopian_search:
  max_listings: 200
  inter_page_delay: 0.5
  note: "Custom HTML scraping; /vacancies/{N} pagination; inline accordion descriptions; closing-date as posting_date."

# GA Telesis uses JazzHR / ApplyToJob (applytojob.com). Single listing page,
# all 40-50 jobs in one table. Row ID encodes posting date (YYYYMMDDHHMMSS).
# GATES dept label = GA Telesis Engine Services (Finland/Dubai engine shops).
# Description: GET /apply/jobs/details/{ID} → div.job_full_listing.clrfix.
gatelesis_search:
  max_listings: 200
  inter_page_delay: 0.5
  note: "ApplyToJob HTML; tr.resumator_even/odd_row; posting date from row ID; desc in div.job_full_listing."

# FL Technics uses A&G Solutions Careers (asgc) WordPress plugin.
# Listing pages are server-side rendered HTML (10 jobs/page, ?p-page=N).
# Individual job URLs redirect to main careers page; descriptions open via JS modal.
# Gate 2 is BYPASSED — descriptions not retrievable without Playwright click-in-modal.
# Expect some false positives from Gate 1+3 passes (Head/Lead non-engine roles).
fltechnics_search:
  max_listings: 200
  inter_page_delay: 0.5
  note: "asgc WP plugin; 10 jobs/page via ?p-page=N; descriptions JS-modal — Gate 2 bypassed; expect false positives."

# Magnetic MRO uses BambooHR. JSON API at /careers/list returns all jobs (currently ~4).
# BambooHR detail pages are React SPAs — descriptions not available in static HTML.
# Gate 2 is BYPASSED — returns ('', '') unconditionally. Low volume, low false-positive risk.
# Engine roles (if any) would appear in Magnetic Engines department.
magnetic_search:
  max_listings: 200
  inter_page_delay: 0.5
  note: "BambooHR JSON API /careers/list; no descriptions (React SPA); Gate 2 bypassed; dept=Magnetic Engines for engine roles."

